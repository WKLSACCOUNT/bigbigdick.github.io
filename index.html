<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武呜呜的 Channel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #d4c5f9 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }

        .login-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            color: #a8edea;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .welcome-text {
            font-size: 2.8rem;
            color: white;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: fadeInDown 0.8s ease-out;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            background: white;
            color: #7cc5be;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            text-decoration: none;
            display: block;
            animation: fadeInUp 0.8s ease-out;
        }

        .btn:nth-child(1) {
            animation-delay: 0.2s;
        }

        .btn:nth-child(2) {
            animation-delay: 0.4s;
        }

        .btn:nth-child(3) {
            animation-delay: 0.6s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h2 {
            font-size: 1.5rem;
            color: #667eea;
            margin-bottom: 20px;
        }

        .modal p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.8;
        }

        .modal .email {
            background: #f0f4ff;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            color: #667eea;
            margin-top: 20px;
            text-align: center;
        }

        .modal .close-btn {
            background: linear-gradient(135deg, #a8edea, #d4c5f9);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 25px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .modal .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(116, 235, 213, 0.4);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .modal-btn.login-action {
            background: linear-gradient(135deg, #a8edea, #d4c5f9);
            color: white;
        }

        .modal-btn.login-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(116, 235, 213, 0.4);
        }

        .modal-btn.register-action {
            background: white;
            color: #a8edea;
            border: 2px solid #a8edea;
        }

        .modal-btn.register-action:hover {
            background: #f0faf7;
            transform: translateY(-2px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a8edea;
            box-shadow: 0 0 0 3px rgba(168, 237, 234, 0.2);
        }

        .form-error {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .form-success {
            color: #27ae60;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }

        .form-success.show {
            display: block;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .welcome-text {
                font-size: 2rem;
            }

            .btn {
                padding: 15px 30px;
                font-size: 1rem;
            }

            .login-btn {
                padding: 8px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <button class="login-btn" onclick="openAuthChoice()">登录</button>

    <div class="container">
        <h1 class="welcome-text">欢迎光临武呜呜的 Channel</h1>
        <div class="buttons-container">
            <a href="career-test.html" class="btn">职业测试</a>
            <a href="123/index.html" class="btn">未开发页面</a>
            <button class="btn" onclick="openModal()">联系我</button>
        </div>
    </div>

    <div class="modal-overlay" id="contactModal">
        <div class="modal">
            <h2>联系我</h2>
            <p>你好！我是武呜呜。</p>
            <p>热爱探索技术与创意的结合，喜欢用代码打造有趣的产品。如果你有任何问题、合作意向或只是想聊聊天，欢迎随时联系我！</p>
            <div class="email">2589584304@qq.com</div>
            <button class="close-btn" onclick="closeModal('contactModal')">关闭</button>
        </div>
    </div>

    <div class="modal-overlay" id="authChoiceModal">
        <div class="modal">
            <h2>欢迎</h2>
            <p>如果你想登录就登录吧，不登录也无所谓</p>
            <div class="modal-buttons">
                <button class="modal-btn login-action" onclick="openLoginForm()">登录</button>
                <button class="modal-btn register-action" onclick="openRegisterForm()">注册</button>
            </div>
            <button class="close-btn" onclick="closeModal('authChoiceModal')">关闭</button>
        </div>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2>登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <div class="form-error" id="loginError"></div>
            <div class="form-success" id="loginSuccess"></div>
            <button class="close-btn" onclick="handleLogin()">登录</button>
            <button class="close-btn" style="background: #e0e0e0; margin-top: 10px;" onclick="switchModal('loginModal', 'authChoiceModal')">返回</button>
        </div>
    </div>

    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <h2>注册</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="registerUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="registerEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="registerPassword" placeholder="请输入密码">
            </div>
            <div class="form-error" id="registerError"></div>
            <div class="form-success" id="registerSuccess"></div>
            <button class="close-btn" onclick="handleRegister()">注册</button>
            <button class="close-btn" style="background: #e0e0e0; margin-top: 10px;" onclick="switchModal('registerModal', 'authChoiceModal')">返回</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://my-db-worker.2589584304.workers.dev';

        function openModal() {
            document.getElementById('contactModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function openAuthChoice() {
            document.getElementById('authChoiceModal').classList.add('active');
        }

        function openLoginForm() {
            switchModal('authChoiceModal', 'loginModal');
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').classList.remove('show');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function openRegisterForm() {
            switchModal('authChoiceModal', 'registerModal');
            document.getElementById('registerError').classList.remove('show');
            document.getElementById('registerSuccess').classList.remove('show');
            document.getElementById('registerUsername').value = '';
            document.getElementById('registerEmail').value = '';
            document.getElementById('registerPassword').value = '';
        }

        function switchModal(from, to) {
            document.getElementById(from).classList.remove('active');
            document.getElementById(to).classList.add('active');
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');
            const successEl = document.getElementById('loginSuccess');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (!username || !password) {
                errorEl.textContent = '请输入用户名和密码';
                errorEl.classList.add('show');
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', username, password })
                });

                const result = await response.json();

                if (result.success) {
                    successEl.textContent = '登录成功！';
                    successEl.classList.add('show');
                    setTimeout(() => {
                        closeModal('loginModal');
                    }, 1500);
                } else {
                    errorEl.textContent = result.message || '用户名或密码错误';
                    errorEl.classList.add('show');
                }
            } catch (e) {
                errorEl.textContent = '网络错误，请稍后重试';
                errorEl.classList.add('show');
            }
        }

        async function handleRegister() {
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const errorEl = document.getElementById('registerError');
            const successEl = document.getElementById('registerSuccess');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (!username || !email || !password) {
                errorEl.textContent = '请填写所有字段';
                errorEl.classList.add('show');
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'register', username, email, password })
                });

                const result = await response.json();

                if (result.success) {
                    successEl.textContent = '注册成功！请登录';
                    successEl.classList.add('show');
                    setTimeout(() => {
                        switchModal('registerModal', 'loginModal');
                    }, 1500);
                } else {
                    errorEl.textContent = result.message || '注册失败，请稍后重试';
                    errorEl.classList.add('show');
                }
            } catch (e) {
                errorEl.textContent = '网络错误，请稍后重试';
                errorEl.classList.add('show');
            }
        }

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
