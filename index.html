<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>欢迎页面</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 100px; }
    input, button { padding: 10px; margin: 5px; font-size: 16px; }
  </style>
</head>
<body>
  <div id="content">
    <h1 id="greeting">请先输入用户名</h1>
    <input type="text" id="username" placeholder="用户名">
    <button id="submitBtn">提交</button>
  </div>

  <script>
    const API_URL = "https://my-db-worker.2589584304.workers.dev"; // 替换为你的 Worker URL
    const API_KEY = "my-secret-key"; // 如果 Worker 使用了 API Key

    // 获取已存用户名
    async function loadUsername() {
      try {
        const res = await fetch(API_URL + "/users");
        const users = await res.json();
        if (users.length > 0) {
          const name = users[0].name;
          document.getElementById("greeting").textContent = `欢迎您，${name}！`;
          document.getElementById("username").style.display = "none";
          document.getElementById("submitBtn").style.display = "none";
        }
      } catch (err) {
        console.error(err);
      }
    }

    // 提交用户名
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const name = document.getElementById("username").value.trim();
      if (!name) return alert("请输入用户名");

      await fetch(API_URL + "/users", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${API_KEY}`
        },
        body: JSON.stringify({ name: name, age: 0 }) // age 可随意填
      });

      document.getElementById("greeting").textContent = `欢迎您，${name}！`;
      document.getElementById("username").style.display = "none";
      document.getElementById("submitBtn").style.display = "none";
    });

    // 页面加载时先检查是否已有用户名
    loadUsername();
  </script>
</body>
</html>
