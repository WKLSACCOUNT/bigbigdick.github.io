<div style="max-width:400px;margin:50px auto;padding:20px;border:1px solid #eee;border-radius:10px;">
  <h3>用户注册（写入 users 表）</h3>

  <input type="text" id="username" placeholder="用户名" style="width:100%;padding:10px;margin:10px 0;">
  <input type="password" id="password" placeholder="密码" style="width:100%;padding:10px;margin:10px 0;">
  <input type="email" id="email" placeholder="邮箱" style="width:100%;padding:10px;margin:10px 0;">

  <button onclick="addUser()" style="width:100%;padding:12px;background:#0070f3;color:white;border:none;border-radius:6px;">
    注册（写入数据库 users 表）
  </button>
</div>

<script>
  // 换成你自己的 Worker 地址
  const API = "https://my-db-worker.2589584304.workers.dev";

  async function addUser() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let email = document.getElementById("email").value;

    if (!username || !password || !email) {
      alert("请填写完整");
      return;
    }

    // 发送到 Worker → 写入 D1 的 users 表
    let res = await fetch(API + "/user/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password, email })
    });

    let data = await res.json();
    alert("注册成功！数据已写入 users 表！");
  }
</script>
