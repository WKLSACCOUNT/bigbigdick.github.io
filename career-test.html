            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;

            background: #f0f0f0;
            color: #666;
        }

        }

        .btn-next {
            background: linear-gradient(135deg, #a8edea, #d4c5f9);

            flex: 1;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);

        // ============================================
        // 应用状态管理
        // ============================================
        const state = {
            currentPage: 'welcome',
            currentQuestionIndex: 0,
            answers: new Array(QUESTIONS_DATA.length).fill(null),
            userVector: [0, 0, 0, 0, 0]
        };

        // ============================================
        // 页面切换函数
        // ============================================
        function showPage(pageName) {
            const pages = {
                'welcome': 'welcomePage',
                'quiz': 'quizPage',
                'loading': 'loadingPage',
                'result': 'resultPage'
            };

            Object.values(pages).forEach(pageId => {
                document.getElementById(pageId).classList.add('hidden');
            });

            document.getElementById(pages[pageName]).classList.remove('hidden');
            state.currentPage = pageName;
        }

        // ============================================
        // 测试流程控制
        // ============================================
        function startQuiz() {
            state.currentQuestionIndex = 0;
            state.answers = new Array(QUESTIONS_DATA.length).fill(null);
            showPage('quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const question = QUESTIONS_DATA[state.currentQuestionIndex];
            const questionIndex = state.currentQuestionIndex;

            // 更新进度
            const progress = ((questionIndex + 1) / QUESTIONS_DATA.length) * 100;
            document.getElementById('progressText').textContent = `第 ${questionIndex + 1} 题 / 共 ${QUESTIONS_DATA.length} 题`;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressPercent').textContent = `${Math.round(progress)}%`;

            // 渲染题目
            document.getElementById('questionText').textContent = question.text;

            // 渲染选项
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const optionCard = document.createElement('div');
                optionCard.className = 'option-card';
                if (state.answers[questionIndex] === index) {
                    optionCard.classList.add('selected');
                }
                optionCard.innerHTML = `
                    <span class="option-label">${option.label}.</span>
                    ${option.text}
                `;
                optionCard.addEventListener('click', () => selectOption(index));
                optionsContainer.appendChild(optionCard);
            });

            // 更新导航按钮状态
            document.getElementById('btnPrev').disabled = questionIndex === 0;
            
            // 如果是最后一题，按钮文字改为「查看结果」
            const btnNext = document.getElementById('btnNext');
            if (questionIndex === QUESTIONS_DATA.length - 1) {
                btnNext.textContent = '查看结果';
            } else {
                btnNext.textContent = '下一题';
            }
            
            btnNext.disabled = state.answers[questionIndex] === null;
        }

        function selectOption(optionIndex) {
            const questionIndex = state.currentQuestionIndex;
            state.answers[questionIndex] = optionIndex;

            // 更新UI
            const optionCards = document.querySelectorAll('.option-card');
            optionCards.forEach((card, index) => {
                card.classList.toggle('selected', index === optionIndex);
            });

            document.getElementById('btnNext').disabled = false;

            // 自动跳转下一题
            setTimeout(() => {
                if (questionIndex < QUESTIONS_DATA.length - 1) {
                    nextQuestion();
                }
            }, 300);
        }

        function nextQuestion() {
            if (state.answers[state.currentQuestionIndex] === null) return;

            if (state.currentQuestionIndex < QUESTIONS_DATA.length - 1) {
                state.currentQuestionIndex++;
                renderQuestion();
            } else {
                // 最后一题，计算结果
                calculateResults();
            }
        }

        function prevQuestion() {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex--;
                renderQuestion();
            }
        }

        // ============================================
        // 结果计算
        // ============================================
        function calculateResults() {
            showPage('loading');

            // 模拟计算延迟，给用户一个过渡感
            setTimeout(() => {
                // 计算用户向量
                const userVector = [0, 0, 0, 0, 0];
                
                state.answers.forEach((answerIndex, questionIndex) => {
                    if (answerIndex !== null) {
                        const selectedOption = QUESTIONS_DATA[questionIndex].options[answerIndex];
                        for (let i = 0; i < 5; i++) {
                            userVector[i] += selectedOption.vector[i];
                        }
                    }
                });

                // 计算与所有职业的余弦相似度
                const similarities = OCCUPATIONS_DATA.map(occupation => {
                    const occVector = [
                        occupation.dimensions.D1,
                        occupation.dimensions.D2,
                        occupation.dimensions.D3,
                        occupation.dimensions.D4,
                        occupation.dimensions.D5
                    ];
                    
                    const similarity = cosineSimilarity(userVector, occVector);
                    return {
                        ...occupation,
                        similarity: similarity
                    };
                });

                // 排序并取前3
                const top3 = similarities
                    .sort((a, b) => b.similarity - a.similarity)
                    .slice(0, 3);

                // 渲染结果
                renderResults(top3);
                showPage('result');
            }, 2000);
        }

        function cosineSimilarity(vectorA, vectorB) {
            let dotProduct = 0;
            let magnitudeA = 0;
            let magnitudeB = 0;

            for (let i = 0; i < vectorA.length; i++) {
                dotProduct += vectorA[i] * vectorB[i];
                magnitudeA += vectorA[i] * vectorA[i];
                magnitudeB += vectorB[i] * vectorB[i];
            }

            magnitudeA = Math.sqrt(magnitudeA);
            magnitudeB = Math.sqrt(magnitudeB);

            if (magnitudeA === 0 || magnitudeB === 0) {
                return 0;
            }

            // 余弦相似度范围是[-1, 1]，映射到[0, 1]
            const similarity = dotProduct / (magnitudeA * magnitudeB);
            return (similarity + 1) / 2;
        }

        function renderResults(top3) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            // 渲染第一匹配（大卡片）
            const primaryCard = createResultCard(top3[0], 0, true);
            container.appendChild(primaryCard);

            // 渲染第二、三匹配（小卡片）
            top3.slice(1).forEach((result, index) => {
                const secondaryCard = createResultCard(result, index + 1, false);
                container.appendChild(secondaryCard);
            });
        }

        function createResultCard(result, rank, isPrimary) {
            const card = document.createElement('div');
            card.className = `result-card ${isPrimary ? 'primary' : 'secondary'}`;
            
            // 将相似度映射为百分比
            const percentage = Math.round(result.similarity * 100);
            
            const rankLabels = ['第一匹配', '第二匹配', '第三匹配'];

            card.innerHTML = `
                <div class="rank-badge">${rankLabels[rank]}</div>
                <div class="occupation-name">${result.occupation}</div>
                <div class="role-tag">${result.role_tag}</div>
                <div class="match-percentage">
                    <div class="percentage-bar">
                        <div class="percentage-fill" style="width: 0%"></div>
                    </div>
                    <div class="percentage-text">${percentage}%</div>
                </div>
            `;

            // 动画效果：延迟填充进度条
            setTimeout(() => {
                card.querySelector('.percentage-fill').style.width = `${percentage}%`;
            }, 300);

            return card;
        }

        function restartQuiz() {
            state.currentQuestionIndex = 0;
            state.answers = new Array(QUESTIONS_DATA.length).fill(null);
            showPage('welcome');
        }
